name: vistar_app
description: Vistar Logitek - KRA Review & Incentive Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.4.9

  # Routing
  go_router: ^13.0.0

  # Networking
  dio: ^5.4.0

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # Local key-value persistence (non-secrets — used for self-rate
  # auto-save / draft resume in the Employee module).
  shared_preferences: ^2.2.2

  # Connectivity awareness
  connectivity_plus: ^5.0.2

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0

  # File attachment picker (self-rate "proof" — local-only for now)
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    # Listed explicitly so the asset bundle picks up new files even when
    # the cached AssetManifest from an earlier `flutter run` wouldn't.
    - assets/images/logo.png
    - assets/images/vistar_logo.png
