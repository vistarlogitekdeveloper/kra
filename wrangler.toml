# Cloudflare deploy config for the Vistar KRA Flutter web app.
#
# Deployed as a Cloudflare **Workers static-assets** site (no Worker code) —
# the whole app is the compiled Flutter bundle in build/web. This matches the
# default Workers Builds deploy command `npx wrangler deploy`.
#
#   Build command:   flutter build web --release
#   Deploy command:  npx wrangler deploy      (uploads the [assets] dir below)

name = "vistar-kra"
compatibility_date = "2024-11-01"

[assets]
directory = "./build/web"
# Serve index.html for any non-asset path so go_router deep links
# (/hr/home, /reviews/monthly/:id) resolve on refresh.
not_found_handling = "single-page-application"
